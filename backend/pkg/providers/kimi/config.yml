# Kimi (Moonshot) agent configuration.
#
# Strategy: kimi-k2.5 for utility/orchestration, kimi-k2.6 for critical reasoning.
#
# K2.6/K2.5 API constraints (any deviation -> invalid_request_error):
#   thinking:     temperature=1.0, top_p=0.95, n=1, thinking.keep="all" (k2.6 only)
#   non-thinking: temperature=0.6, top_p=0.95, n=1
#   always:       presence_penalty=0, frequency_penalty=0, tool_choice in {auto, none}
#
# WORKAROUND (drop after fix in langchaingo): for kimi-k2.5 non-thinking agents we
# duplicate temperature=0.6 into extra_body. Reason: langchaingo's
# reasoning.IsReasoningModel matches substring "2.5" and force-overrides temperature
# to 1.0 in createChatRequest. extra_body merges with priority via maps.Copy in
# openaiclient.createChat, so it bypasses the override. Remove the duplicate
# extra_body.temperature once langchaingo stops matching k2.5/k2.6 as reasoning.
#
# Legacy kimi-k2-* models (turbo-preview, 0905-preview, 0711-preview, thinking,
# thinking-turbo) were deprecated by Moonshot on 2026-05-25. Do not reintroduce.

simple:
  model: kimi-k2.5
  temperature: 0.6
  top_p: 0.95
  n: 1
  max_tokens: 8192
  extra_body:
    temperature: 0.6
    thinking:
      type: disabled
    tool_choice: auto
  price:
    input: 0.60
    output: 3.00
    cache_read: 0.10

