# DeepSeek V4 agent configuration.
#
# Strategy: prefer deepseek-v4-flash (12x cheaper) for the "workhorse" agents,
# reserve deepseek-v4-pro for complex multi-step reasoning (planning, mentor,
# code generation, vulnerability analysis, orchestration).
#
# Hyperparameters note:
# - v4-pro agents with `reasoning.effort` set MUST NOT specify temperature/top_p
#   (langchaingo nullifies them, and DeepSeek silently ignores them in thinking
#   mode together with presence_penalty/frequency_penalty).
# - v4-flash utility agents explicitly disable thinking via extra_body to keep
#   them fast and cheap.
# - All thinking-enabled agents also pass extra_body.thinking.type explicitly
#   as a defensive measure against future DeepSeek default changes.

simple:
  model: deepseek-v4-flash
  temperature: 0.3
  top_p: 0.9
  n: 1
  max_tokens: 8192
  extra_body:
    thinking:
      type: disabled
  price:
    input: 0.14
    output: 0.28
    cache_read: 0.0028

simple_json:
  model: deepseek-v4-flash
  temperature: 0.3
  top_p: 0.9
  n: 1
  max_tokens: 4096
  json: true
  extra_body:
    thinking:
      type: disabled
  price:
    input: 0.14
    output: 0.28
    cache_read: 0.0028

primary_agent:
  model: deepseek-v4-pro
  n: 1
  max_tokens: 16384
  reasoning:
    effort: high
  extra_body:
    thinking:
      type: enabled
  price:
    input: 1.74
    output: 3.48
    cache_read: 0.0145

